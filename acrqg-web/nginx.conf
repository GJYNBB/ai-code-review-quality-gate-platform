# =============================================================================
# AI 辅助代码评审与质量门禁平台 — 前端 nginx 站点配置
# Task:        B0-B.6
# Requirement: R23.6
# Design:      design.md §17.1（HTTPS 由外层 nginx 终结，本镜像仅监听 80）
#
# 关键点：
#   - SPA history 模式回退：try_files $uri $uri/ /index.html
#   - /api/ 反代到 docker-compose 中的 backend 服务（http://backend:8080）
#   - 静态资源开启 gzip 压缩与长缓存（带 hash 文件名由 vite 产出）
#   - 注入 HSTS / X-Content-Type-Options / X-Frame-Options 等安全头
# =============================================================================

server {
    listen       80;
    listen       [::]:80;
    server_name  _;

    root         /usr/share/nginx/html;
    index        index.html;

    # ---------------- 安全头 ----------------
    # HSTS：在外层 HTTPS 终端将其透传给浏览器；纯 HTTP 端口下浏览器会忽略此头，但仍保留以适配反向代理转发
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'self'" always;

    # ---------------- gzip 压缩 ----------------
    gzip               on;
    gzip_vary          on;
    gzip_min_length    1024;
    gzip_comp_level    5;
    gzip_proxied       any;
    gzip_types
        application/javascript
        application/json
        application/xml
        application/wasm
        text/css
        text/javascript
        text/plain
        text/xml
        image/svg+xml
        font/ttf
        font/otf;

    # ---------------- /api 反向代理到后端 ----------------
    location /api/ {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Request-Id      $request_id;
        # 评审任务接口可能耗时较长（< 3min），放宽读取超时
        proxy_read_timeout 300s;
        proxy_send_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # ---------------- 静态资源（带 hash 长缓存） ----------------
    location /assets/ {
        access_log off;
        expires    30d;
        add_header Cache-Control "public, max-age=2592000, immutable" always;
        try_files  $uri =404;
    }

    # ---------------- favicon / 静态文件 ----------------
    location = /favicon.ico {
        access_log off;
        log_not_found off;
    }

    location = /robots.txt {
        access_log off;
        log_not_found off;
    }

    # ---------------- SPA history 模式回退 ----------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---------------- 错误页 ----------------
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
