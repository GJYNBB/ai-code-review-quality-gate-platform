# ============================================================================
#  Profile: dev (本地开发)
#
#  与 prod 的差异：
#    - logging.level.com.acrqg=DEBUG，便于本地排查；
#    - swagger UI 默认开启 (沿用 application.yml)；
#    - CORS 允许所有来源，便于前端 vite dev server (5173) 直连后端 (8080)；
#    - 关闭 HTTPS 强制 (HttpsRedirectConfig 仅在 @Profile("prod") 下启用，无需在此覆盖)。
#
#  关联：design.md §17.3，requirements.md R17.3 / R24.6
# ============================================================================

logging:
  level:
    root: INFO
    com.acrqg: DEBUG
    org.springframework.security: INFO

springdoc:
  swagger-ui:
    enabled: true
  api-docs:
    enabled: true

management:
  endpoint:
    health:
      # 本地开发暴露详情，便于排查 Redis / DB 连通性。
      show-details: always

app:
  cors:
    # dev 全放开；prod 由 app.cors.allowed-origins 显式枚举。
    allowed-origins: "*"
